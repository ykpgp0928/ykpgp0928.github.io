<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少年游系列 | 国翔词苑</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script>
      fetch('header.html')
        .then(response => {
          if (!response.ok) throw new Error('加载 header 失败');
          return response.text();
        })
        .then(data => {
          document.body.insertAdjacentHTML('afterbegin', data);
          document.body.style.visibility = 'visible';
        })
        .catch(error => {
          console.error('header 加载错误:', error);
          document.body.style.visibility = 'visible';
        });
    </script>

    <div class="container">
        <a href="index.html" class="back">← 返回首页</a>
        
        <div class="ci">
            <div class="title">少年游</div>
            <pre>
干藤稀叶粘枯枝，萧瑟木空时。
秋风带悲，催人下泪，云月又何知？

天地戏人为己乐，昏镜映忧姿。
祖父抱恙，岁余三五，滴泪化幽思。
            </pre>
            <p class="author">—— 秋风萧瑟，祖孙情深</p>
        </div>
    </div>

</body>
</html>
