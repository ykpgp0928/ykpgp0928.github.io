            <pre>
干藤稀叶粘枯枝，萧瑟木空时。
秋风带悲，催人下泪，云月又何知？

天地戏人为己乐，昏镜映忧姿。
祖父抱恙，岁余三五，滴泪化幽思。
            </pre>
            <p class="author">—— 秋风萧瑟，祖孙情深</p>
            
            <!-- 新增注释 -->
            <p style="text-align:center; margin-top:15px; color:#777; font-size:0.92em;">
                （岁余三五：指生病了两三年）
            </p>
