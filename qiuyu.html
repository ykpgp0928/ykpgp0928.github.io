        <div class="ci">
            <div class="title">秋雨（其一）</div>
            <pre>
黑云如墨胜天高，秋风怒号卷云霄
一雨恍若新春到，簇簇灯笼垂树梢
            </pre>
            <p class="author">—— 暴雨洗秋，灯笼如春</p>
        </div>

        <div class="ci">
            <div class="title">秋雨（其二）</div>
            <pre>
湖面波光映四方，杨柳青黄显沧桑。
细雨迎风扑面至，烟波朦胧遮面庞。
            </pre>
            <p class="author">—— 细雨朦胧，杨柳沧桑</p>
