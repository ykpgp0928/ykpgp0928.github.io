<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉兰双阕 · 国翔 初二作品</title>
    <style>
        body {
            font-family: 'KaiTi', 'SimSun', 'Songti SC', serif;
            background: linear-gradient(to bottom, #f8f5f2, #e8e0d9);
            color: #2c2c2c;
            margin: 0;
            padding: 20px;
            line-height: 1.9;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #5a7d9a;
            margin: 40px 0 20px;
            font-size: 2.2em;
        }
        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 50px;
            font-size: 1.1em;
        }
        .ci {
            background: white;
            padding: 30px;
            margin: 30px 0;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }
        .title {
            font-size: 1.6em;
            text-align: center;
            color: #6b4e31;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        pre {
            font-size: 1.25em;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }
        .author {
            text-align: right;
            font-style: italic;
            color: #666;
            margin-top: 15px;
            font-size: 1em;
        }
        footer {
            text-align: center;
            margin: 60px 0 40px;
            color: #888;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <h1>玉兰</h1>
    <p class="subtitle">初二学生 · 庸国翔 创作 · 2026年</p>

    <div class="ci">
        <div class="title">卜算子</div>
        <pre>
泥泞池沼旁，寂寥无人守。
瑟瑟春风吹人冷，摇曳花难久。

自在独放枝，花落犹如旧。
挺立枝头迎风雨，绝胜河堤柳。
        </pre>
        <p class="author">—— 泥泞中挺立的傲骨</p>
    </div>

    <div class="ci">
        <div class="title">浣溪沙</div>
        <pre>
玉树垂枝立雪兰，春风裹暖给人欢。试问谁可胜其端？
花落缤纷香满径，傲然枝顶胜春寒。冰肤玉骨仅花单。
        </pre>
        <p class="author">—— 雪寒里的冰清玉洁</p>
    </div>

    <footer>
        <p>少年心事当拿云，绝胜人间河堤柳。</p>
        <p>更多作品，敬请期待……</p>
    </footer>
</body>
</html>
