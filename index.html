<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<body>

    <!-- 动态加载 header -->
    <script>
      fetch('header.html')
        .then(response => {
          if (!response.ok) throw new Error('加载 header 失败');
          return response.text();
        })
        .then(data => {
          document.body.insertAdjacentHTML('afterbegin', data);
          document.body.style.visibility = 'visible';
        })
        .catch(error => {
          console.error('header 加载错误:', error);
          document.body.style.visibility = 'visible';
        });
    </script>

    <div class="hero">
        <h1>词苑</h1>
        <p>初二少年 · 玉兰为骨 · 秋思为魂</p>
    </div>

    <div class="container">
        <h2 style="text-align:center; margin-bottom:40px;">选择词集系列</h2>
        <div class="buttons">
            <a href="yulan.html" class="btn">
                🌸 玉兰系列<br>
                <small style="font-size:0.85em; color:#666;">卜算子 · 浣溪沙</small>
            </a>
            <a href="shaonianyou.html" class="btn">
                🍂 少年游系列<br>
                <small style="font-size:0.85em; color:#666;">秋风悲思 · 祖父抱恙</small>
            </a>
            <a href="qiuyu.html" class="btn">
                🌧️ 秋雨系列(早期作品)<br>
                <small style="font-size:0.85em; color:#666;">其一 · 其二</small>
            </a>
            <a href="#" class="btn">
                其他(待添加)<br>

            </a>

    </div>

    <footer>
        <p>少年心事当拿云，绝胜河堤柳。<br>更多系列持续更新中……</p>
    </footer>

</body>
</html>
